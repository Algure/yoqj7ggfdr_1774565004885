    const panel = document.getElementById('drawupOverlayPanel_Container');
    const openBtn = document.getElementById('drawupOverlayOpenBtn_Main');
    const testBtn = document.getElementById('drawupOverlayTestBtn_Demo');
    const closeBtn = document.getElementById('drawupOverlayCloseBtn_Default');
    const header = document.getElementById('drawupOverlayHeader_Draggable');
    const backdrop = document.getElementById('drawupOverlayBackdrop_Modal');
    const imageContainer = document.getElementById('drawupOverlayImageContainer_Display');
    const panelImage = document.getElementById('drawupOverlayPanelImage_Element');
    const placeholderText = document.getElementById('drawupOverlayPlaceholder_Text');
    const titleElement = document.getElementById('drawupOverlayTitle_Element');
    const detailsElement = document.getElementById('drawupOverlayDetails_Element');
    const buttonColumn = document.getElementById('drawupOverlayButtonColumn_Container');
    const contentWrapper = document.getElementById('drawupOverlayContentWrapper_Main');

    let startY = 0;
    let startHeight = 0;
    let isDragging = false;
    let isZoomed = false;
    let currentImageClickHandler = null;

    function setPanelHeight(vh) {
      const clamped = Math.max(0, Math.min(vh, 100));
      panel.style.height = clamped + 'vh';
    }

    function openOverlayReal(options = {}) {
      const {
        imageURL = null,
        imgOnClick = null,
        titleText = null,
        detailsText = null,
        buttonsList = [],
        backgroundColor = '#f8f9fa',
        textColor = '#333'
      } = options;
      // console.log(`imageURL ${(imageURL).toString()}`)
      // Set background and text colors
      panel.style.background = backgroundColor;
      contentWrapper.style.color = textColor;
      titleElement.style.color = textColor;
      detailsElement.style.color = textColor;

      // Handle image
      if (imageURL) {
        imageContainer.classList.add('show');
        panelImage.src = imageURL;
        panelImage.style.display = 'block';
        placeholderText.style.display = 'none';
        currentImageClickHandler = imgOnClick;
      } else {
        imageContainer.classList.remove('show');
        panelImage.style.display = 'none';
        placeholderText.style.display = 'block';
        currentImageClickHandler = null;
      }

      // Handle title
      if (titleText) {
        titleElement.textContent = titleText;
        titleElement.classList.add('show');
      } else {
        titleElement.classList.remove('show');
      }

      // Handle details
      if (detailsText) {
        detailsElement.textContent = detailsText;
        detailsElement.classList.add('show');
      } else {
        detailsElement.classList.remove('show');
      }

      // Handle buttons
      buttonColumn.innerHTML = '';
      
      // Add custom buttons
      buttonsList.forEach(([buttonText, colorHex, id]) => {
        const button = document.createElement('button');
        button.id = id;
        button.textContent = buttonText;
        button.style.backgroundColor = colorHex;
        button.style.color = getContrastColor(colorHex);
        button.style.borderColor = colorHex;
        buttonColumn.appendChild(button);
      });

      // Always add close button
      // const closeButton = document.createElement('button');
      // closeButton.textContent = 'Close';
      // closeButton.addEventListener('click', closePanel);
      // buttonColumn.appendChild(closeButton);

      // Open panel
      setPanelHeight(70);
      backdrop.classList.add('show');
    }

    function getContrastColor(hexcolor) {
      // Remove # if present
      hexcolor = hexcolor.replace('#', '');
      
      // Convert to RGB
      const r = parseInt(hexcolor.substr(0, 2), 16);
      const g = parseInt(hexcolor.substr(2, 2), 16);
      const b = parseInt(hexcolor.substr(4, 2), 16);
      
      // Calculate brightness
      const brightness = ((r * 299) + (g * 587) + (b * 114)) / 1000;
      
      return brightness > 155 ? '#000000' : '#ffffff';
    }

   
    backdrop.addEventListener('click', closePanel);

    function closePanel() {
      setPanelHeight(0);
      backdrop.classList.remove('show');
      // Reset zoom when closing
      if (isZoomed) {
        if (currentImageClickHandler) {
          panelImage.style.transform = 'scale(1)';
        } else {
          imageContainer.style.transform = 'scale(1)';
        }
        imageContainer.style.cursor = 'zoom-in';
        isZoomed = false;
      }
    }

    // Image zoom functionality
    const toggleZoom = (e) => {
      e.stopPropagation();
      
      // Use custom click handler if provided
      if (currentImageClickHandler) {
        currentImageClickHandler(e);
        return;
      }
      
      // Default zoom behavior
      if (isZoomed) {
        if (panelImage.style.display === 'block') {
          panelImage.style.transform = 'scale(1)';
        } else {
          imageContainer.style.transform = 'scale(1)';
        }
        imageContainer.style.cursor = 'zoom-in';
        isZoomed = false;
      } else {
        if (panelImage.style.display === 'block') {
          panelImage.style.transform = 'scale(1.5)';
        } else {
          imageContainer.style.transform = 'scale(1.5)';
        }
        imageContainer.style.cursor = 'zoom-out';
        isZoomed = true;
      }
    };

    imageContainer.addEventListener('click', toggleZoom);

    // Drag functionality
    const startDrag = y => {
      isDragging = true;
      startY = y;
      startHeight = panel.getBoundingClientRect().height;
      panel.style.transition = 'none';
    };

    const duringDrag = y => {
      if (!isDragging) return;
      const delta = startY - y;
      const newHeight = ((startHeight + delta) / window.innerHeight) * 100;
      setPanelHeight(newHeight);
    };

    const endDrag = () => {
      if (!isDragging) return;
      isDragging = false;
      panel.style.transition = '';
      const currentHeight = parseFloat(panel.style.height);
      if (currentHeight < 15) closePanel();
      else if (currentHeight < 60) setPanelHeight(50);
      else setPanelHeight(100);
    };

    // Touch events
    header.addEventListener('touchstart', e => startDrag(e.touches[0].clientY), { passive: true });
    window.addEventListener('touchmove', e => duringDrag(e.touches[0].clientY), { passive: false });
    window.addEventListener('touchend', endDrag);

    // Mouse events
    header.addEventListener('mousedown', e => startDrag(e.clientY));
    window.addEventListener('mousemove', e => duringDrag(e.clientY)); 
    window.addEventListener('mouseup', endDrag);

    // Expose openOverlay function globally
    window.openOverlayReal = openOverlayReal;
   </script>

 function hexToRgb(hex) {
      hex = hex.replace("#", "");
       if (!/^[0-9a-fA-F]{6}$/.test(hex)) {
          return { r: 0, g: 0, b: 0 };
        }
      return {
        r: parseInt(hex.slice(0, 2), 16),

      };

    function rgbToHex({ r, g, b }) {
      const toHex = (v) =>
        Math.max(0, Math.min(255, Math.round(v)))
          .toString(16)
          .padStart(2, "0");

      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    // ---- Shade Logic ----
    function shadeColor(hex, percent) {
      const { r, g, b } = hexToRgb(hex);

      const t = percent < 0 ? 0 : 255;
      const p = Math.abs(percent);

      return rgbToHex({
        r: (t - r) * p + r,
        g: (t - g) * p + g,
        b: (t - b) * p + b
      });
    }

    // ---- Generate Multiple Shades ----
    function generateShades(hex, steps = 5) {
      const shades = [];

      for (let i = -steps; i <= steps; i++) {
        if (i === 0) continue;
        shades.push(shadeColor(hex, i / (steps * 2)));
      }

      return shades;
    }

        function attachDropdownItem(targetElement, label, callback) {
           if (!targetElement){

             }
            // Utility to generate unique dropdown ID
            function generateDropdownID() {
              return `dropdown-${Math.random().toString(36).slice(2, 10)}`;
            }
    
            // Closes all dropdowns on the page
            function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                menu.style.display = 'none';
            });
            }
    
    
          // Check if dropdown already assigned
          let dropdownId = targetElement.dataset.dropdownId;
          let dropdown;
    
          if (!dropdownId) {
            // Create dropdown
            dropdown = document.createElement('div');
            dropdown.className = 'dropdown-menu';
            dropdownId = generateDropdownID();
            dropdown.id = dropdownId;
            targetElement.dataset.dropdownId = dropdownId;
            document.body.appendChild(dropdown);
    
            // Positioning on click
            targetElement.addEventListener('click', (e) => {
              e.stopPropagation();
              closeAllDropdowns();
            
              const rect = targetElement.getBoundingClientRect();
            
              dropdown.style.display = 'block'; // must show first to measure width
            
              const dropdownWidth = dropdown.offsetWidth;
              const viewportWidth = window.innerWidth;
            
              let left;
            
              // Calculate horizontal center position ratio (0 = far left, 1 = far right)
              const horizontalRatio = rect.left / viewportWidth;
            
              if (horizontalRatio > 0.6) {
                // Element is toward the right side → align dropdown more left
                left = rect.right - dropdownWidth;
              } else if (horizontalRatio < 0.4) {
                // Element is toward the left side → align dropdown more right
                left = rect.left;
              } else {
                // Element is near center → center dropdown relative to element
                left = rect.left + (rect.width / 2) - (dropdownWidth / 2);
              }
            
              // Prevent overflow left
              left = Math.max(8, left);
            
              // Prevent overflow right
              left = Math.min(viewportWidth - dropdownWidth - 8, left);
            
              dropdown.style.left = `${left}px`;
              dropdown.style.top = `${rect.bottom + window.scrollY}px`;
            });
            // Global close
            document.addEventListener('click', () => {
              dropdown.style.display = 'none';
            });
          } else {
            dropdown = document.getElementById(dropdownId);
          }
    
          // Add item
          const item = document.createElement('div');
          item.className = `dropdown-item ${newId}`;
          item.textContent = label;
          item.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.style.display = 'none';
            callback?.(label, targetElement, dropdownId);
          });

  function extractRouteFromValue(value) {
    if (value == null) return "";
    let route = String(value).trim();

    if (!route) return "";
    if (route.startsWith("#")) {
      route = route.slice(1);
    } else if (route.includes("#")) {
      route = route.split("#").pop();
    }

    route = route.trim();
    if (!route) return "";

    // In srcdoc iframes, href can be about:srcdoc/about:blank; never treat those as routes.
    if (route === "about:srcdoc" || route === "about:blank" || route.startsWith("about:")) {
      return "";
    }

    return route;
  }

  function resolveCurrentRoute(fallbackRoute) {
    const candidates = [];

    try { candidates.push(window.location.hash); } catch (_) {}
    try { candidates.push(window.location.href); } catch (_) {}
    try {
      if (window.parent && window.parent !== window) {
        candidates.push(window.parent.location.hash);
      }
    } catch (_) {}
    try {
      if (window.top && window.top !== window) {
        candidates.push(window.top.location.hash);
      }
    } catch (_) {}

    for (const candidate of candidates) {
      const route = extractRouteFromValue(candidate);
      if (route) return route;
    }

    return fallbackRoute;
  }

  async function navigate(route, options = {}) {
    const { updateHistory = true, replaceHistory = false } = options;

    const requestId = ++navigateRequestId;
    if (navigateAbortController) {
      navigateAbortController.abort();
    }
    navigateAbortController = new AbortController();
    const { signal } = navigateAbortController;
  
    const isStaleRequest = () => requestId !== navigateRequestId;

    let fullPath = window.location.pathname;
    let parts = fullPath.split("/");

    // Remove trailing .html if present
    if (fullPath.endsWith(".html")) {
      parts.pop(); // remove the last segment (the .html file)
      fullPath = parts.join("/") || "/";
    }
        let basePath = [fullPath, route]
      .map(s => s.replace(/^\/|\/$/g, '')) // remove leading/trailing slashes
      .filter(Boolean) // remove empty strings
      .join('/'); // join with single slash
    
    basePath = '/' + basePath; // ensure leading slash


    // 1️⃣ Load HTML
    let response = await fetch(basePath + ".ginni", { signal });
    if (isStaleRequest()) return;
    
    if (response.status === 404) {
          const cleanPath = window.location.pathname.replace(/^\/|\/$/g, "");
      basePath = "/" + cleanPath + "/" + route.replace(/^\//, "");
          }

    // Fetch the HTML content
    var htmlContent = await fetch(basePath + `.ginni`, { signal }).then(r => r.text());

    htmlContent = JSON.parse(htmlContent);

    applyPageCSS(htmlContent['css']);
